name: tagpr

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  detect-targets:
    runs-on: ubuntu-latest
    outputs:
      targets: ${{ steps.detect.outputs.targets }}
      has_targets: ${{ steps.detect.outputs.has_targets }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Detect changed targets
        id: detect
        run: |
          TARGETS=()
          BEFORE="${{ github.event.before }}"
          if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            CHANGED=$(git diff --name-only HEAD)
          else
            CHANGED=$(git diff --name-only "${BEFORE}" "${{ github.sha }}")
          fi

          for dir in targetA targetB; do
            if echo "$CHANGED" | grep -q "^${dir}/"; then
              TARGETS+=("\"${dir}\"")
            fi
          done

          if [ ${#TARGETS[@]} -eq 0 ]; then
            echo "targets=[]" >> "$GITHUB_OUTPUT"
            echo "has_targets=false" >> "$GITHUB_OUTPUT"
          else
            JOINED=$(IFS=,; echo "${TARGETS[*]}")
            echo "targets=[${JOINED}]" >> "$GITHUB_OUTPUT"
            echo "has_targets=true" >> "$GITHUB_OUTPUT"
          fi

  tagpr:
    needs: detect-targets
    if: needs.detect-targets.outputs.has_targets == 'true'
    runs-on: ubuntu-latest
    strategy:
      max-parallel: 1
      matrix:
        target: ${{ fromJson(needs.detect-targets.outputs.targets) }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: Songmu/tagpr@e84001bd5dac8defa0c75b3913937d284a3b3660 # v1.20.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          config: ${{ matrix.target }}/.tagpr
